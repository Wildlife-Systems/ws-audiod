[daemon]
socket_path = /run/ws-audiod/control.sock
clips_dir = /var/ws/audiod/clips
ring_buffer_seconds = 60
enable_sample_sharing = true
shm_name = /ws_audiod_samples

[audio]
device = plughw:1,0
rate = 48000
channels = 1
bits_per_sample = 32
period_size = 1024
buffer_periods = 4
gain_db = 0.0
# dc_remove = false
# cpu_affinity = 0

[block_recorder]
enabled = true
output_dir = /var/ws/audio
# block_duration_seconds = 300
# format = wav
# max_blocks = 0
